<style>
  /* Minimal reset for the mockup */
  .mockup-body * { box-sizing: border-box; }
  .design-preview { font-family: 'Fira Sans', 'Segoe UI', system-ui, sans-serif; color: #1e293b; }
  .design-preview .header {
    border-bottom: 1px solid #dbeafe; padding: 32px 0 24px; margin-bottom: 40px;
  }
  .design-preview .header .eyebrow {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #1e40af; font-weight: 600; margin-bottom: 8px;
  }
  .design-preview .header h1 {
    font-family: 'Fira Code', 'Cascadia Code', monospace;
    font-size: 22px; font-weight: 500; color: #0f172a; margin: 0;
  }
  .design-preview .header p {
    font-size: 14px; color: #64748b; margin: 6px 0 0; max-width: 560px; line-height: 1.6;
  }
  .step-progress {
    display: flex; gap: 0; margin-bottom: 40px;
  }
  .step-progress .step {
    flex: 1; display: flex; align-items: center; gap: 10px; padding: 0;
    position: relative;
  }
  .step-progress .step::after {
    content: ''; flex: 1; height: 1px; background: #e2e8f0; margin-left: 10px;
  }
  .step-progress .step:last-child::after { display: none; }
  .step-progress .step .num {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid #cbd5e1; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500; color: #94a3b8; flex-shrink: 0;
    font-family: 'Fira Code', monospace;
  }
  .step-progress .step.active .num {
    background: #1e40af; border-color: #1e40af; color: #fff;
  }
  .step-progress .step.done .num {
    background: #f0fdf4; border-color: #22c55e; color: #16a34a;
  }
  .step-progress .step .label {
    font-size: 13px; color: #94a3b8; font-weight: 400; white-space: nowrap;
  }
  .step-progress .step.active .label { color: #1e40af; font-weight: 500; }
  .step-progress .step.done .label { color: #16a34a; }

  .form-section {
    border-left: 2px solid #dbeafe; padding-left: 24px; margin-bottom: 36px;
  }
  .form-section.active { border-left-color: #1e40af; }
  .form-section h3 {
    font-family: 'Fira Code', monospace; font-size: 14px; font-weight: 500;
    color: #1e40af; margin: 0 0 6px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .form-section .q-title {
    font-size: 15px; font-weight: 500; color: #0f172a; margin: 0 0 16px; line-height: 1.5;
  }

  .radio-group { display: flex; flex-direction: column; gap: 6px; }
  .radio-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    font-size: 14px; color: #334155;
  }
  .radio-item:hover { border-color: #93c5fd; background: #f8fafc; }
  .radio-item.selected { border-color: #1e40af; background: #eff6ff; }
  .radio-item input[type="radio"] { accent-color: #1e40af; margin: 0; }

  .check-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .check-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer;
    font-size: 14px; color: #334155; transition: border-color 0.15s, background 0.15s;
  }
  .check-item:hover { border-color: #93c5fd; background: #f8fafc; }
  .check-item.checked { border-color: #1e40af; background: #eff6ff; }
  .check-item input[type="checkbox"] { accent-color: #1e40af; margin: 0; }

  .tag-area {
    border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px;
    background: #fafbfc; margin-top: 12px;
  }
  .tag-row {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px;
    min-height: 0;
  }
  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 4px; font-size: 13px;
    background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af;
    font-family: 'Fira Code', monospace;
  }
  .tag .remove { cursor: pointer; color: #94a3b8; font-size: 14px; line-height: 1; }
  .tag .remove:hover { color: #dc2626; }
  .tag-input-row {
    display: flex; align-items: center; gap: 8px;
    border: 1px dashed #cbd5e1; border-radius: 6px; padding: 6px 12px;
    background: #fff;
  }
  .tag-input-row input {
    border: none; outline: none; flex: 1; font-size: 13px; color: #334155;
    font-family: 'Fira Code', monospace;
  }
  .tag-input-row input::placeholder { color: #94a3b8; }
  .tag-hint { font-size: 11px; color: #94a3b8; }

  .nav-btns {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 40px; padding-top: 24px; border-top: 1px solid #e2e8f0;
  }
  .btn {
    padding: 10px 24px; border-radius: 6px; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; border: none;
    font-family: 'Fira Sans', system-ui, sans-serif;
  }
  .btn-prev {
    background: #fff; color: #64748b; border: 1px solid #e2e8f0;
  }
  .btn-prev:hover { background: #f8fafc; color: #334155; }
  .btn-next {
    background: #1e40af; color: #fff;
  }
  .btn-next:hover { background: #1e3a8a; }

  .team-select {
    width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 6px;
    font-size: 14px; color: #334155; background: #fff; cursor: pointer;
    font-family: 'Fira Sans', system-ui, sans-serif;
  }
  .team-select:focus { outline: none; border-color: #1e40af; box-shadow: 0 0 0 3px rgba(30,64,175,0.1); }

  @media (max-width: 640px) {
    .check-grid { grid-template-columns: 1fr; }
    .step-progress .step .label { display: none; }
    .step-progress .step::after { margin-left: 4px; }
  }
</style>
